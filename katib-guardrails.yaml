apiVersion: v1
kind: LimitRange
metadata:
  name: katib-trial-limits
  namespace: kubeflow
spec:
  limits:
    - type: Container
      max:
        cpu: "2"
        memory: "4Gi"
      min:
        cpu: "100m"
        memory: "256Mi"
      default:
        cpu: "1"
        memory: "2Gi"
      defaultRequest:
        cpu: "500m"
        memory: "1Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: katib-quota
  namespace: kubeflow
spec:
  hard:
    requests.cpu: "4"
    limits.cpu: "4"
    requests.memory: "8Gi"
    limits.memory: "8Gi"
    requests.nvidia.com/gpu: "1"
    limits.nvidia.com/gpu: "1"
