apiVersion: v1
kind: Service
metadata:
  name: code-server
spec:
  clusterIP: None
  selector:
    app: code-server
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: code-server
spec:
  serviceName: "code-server"
  replicas: 1
  selector:
    matchLabels:
      app: code-server
  template:
    metadata:
      labels:
        app: code-server
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      initContainers:
        - name: init-workspace
          image: code-server-python:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              STARTER="/opt/mlops-starter"
              PROJECT="/home/coder/project"
              mkdir -p "${PROJECT}/manifests"
              # Sentinel file: only initialize once per PVC lifetime
              if [ ! -f "${PROJECT}/.initialized" ]; then
                # -n: do not overwrite if target already exists
                cp -rn "${STARTER}/." "${PROJECT}/"
                touch "${PROJECT}/.initialized"
                echo "[init-workspace] Workspace bootstrapped from ${STARTER}"
              else
                echo "[init-workspace] Already initialized, skipping."
              fi
          volumeMounts:
            - name: workspace-data
              mountPath: /home/coder/project
      containers:
      - name: code-server
        image: code-server-python:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        args: ["/home/coder/project"]
        env:
        - name: PASSWORD
          value: "1234"
        volumeMounts:
        - name: workspace-data
          mountPath: /home/coder/project
  volumeClaimTemplates:
  - metadata:
      name: workspace-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi
